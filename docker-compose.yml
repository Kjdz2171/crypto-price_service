version: "3.9"

services:
  app:
    build: .
    container_name: crypto-price-app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=crypto_user
      - DB_PASSWORD=crypto_password
      - DB_NAME=crypto_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  worker:
    build: .
    container_name: crypto-price-worker
    command: celery -A app.celery_app.celery_app worker -B --loglevel=info
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=crypto_user
      - DB_PASSWORD=crypto_password
      - DB_NAME=crypto_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    container_name: crypto-price-db
    environment:
      - POSTGRES_DB=crypto_db
      - POSTGRES_USER=crypto_user
      - POSTGRES_PASSWORD=crypto_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: crypto-price-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:

